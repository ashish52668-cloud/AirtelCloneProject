<html>
	<head>
		<title>Playground Tasks</title>
		<style>
			#mainarea {
					width:100%;
					height:1000px;
					background:green;
					position:relative;
					
			}
			@keyframes ball{
				8%  {
					transform:translate(0px,430px);
				}
				16% {
					transform:translate(100px,-20px);
				}
				24% {
					transform:translate(200px,300px);
				}
				32% {
					transform:translate(300px,-10px);
				}
				40% {
					transform:translate(400px,220px);
				}
				48% {
					transform:translate(500px,-5px);
				}
				56% {
					transform:translate(600px,150px);
				}
				64% {
					transform:translate(700px,5px);
				}
				72% {
					transform:translate(800px,200px);
				}
				80% {
					transform:translate(900px,-30px);
				}
				88% {
					transform:translate(1050px,220px);
				}
				96% {
					transform:translate(1250px,-20px);
				}
				100% {
					transform:translate(1400px,320px);
				}

			}
			#workarea {
					width:1510;
					height:600px;
					position:relative;
					top:100px;
										
			}
			#workarea img {
					width:100%;
					height:100%;
			}
					
			#ballarea {
					width:100px;
					height:100px;
					border-radius:50%;
					background:red;
					position:relative;
					bottom:600px;
					left:0px;
			}
			#ballarea {
					animation-name:ball;
					animation-duration:10s;
					
		</style>
	</head>
	<body>
		<div id="mainarea">
			<div id="workarea">
				<img src="mountain.webp"/>
				<div id="ballarea">
				</div>
			</div>
		</div>
	</body>
</html>
