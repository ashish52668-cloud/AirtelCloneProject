<html>
	<head>
		<title>Square task</title>
		<style>
		

		#mainarea {
				width:1200px;
				height:1500px;
				background:red;
				margin:0 auto;
				position:relative;
		}
		
		@keyframes sqr {
				0% {
					transform:translate(0px,0px);
				}
				25% {
					transform:translate(1050px,0px);
					background:yellow;
					border-radius:50%;
				}
				50% {
					transform:translate(1050px,450px);
					background:pink;
					border-radius:0;

		
				}
				75%  {
					transform:translate(0px,450px);
					background:green;
					border-radius:50%;

				}
				100%  {
					transform:translate(0,0);
					background:brown;
					border-radius:50%;

				}
		}
						
		
		#taskarea {
				width:100%;
				height:600px;
				background:blue;
				position:relative;
				top:50px;
		}
		#squarearea {
				width:150px;
				height:150px;
				background:cyan;
		}
		#squarearea {
				animation-name:sqr;
				animation-duration:15s;
				animation-timing-function:linear;
		}
	
	
		</style>
	</head>
	</body>
		<div id="mainarea">
			<div id="taskarea">
				<div id="squarearea">
				</div>
			</div>
		</div>
	</body>
</htmml>
