<html>
	<head>
		<title>Flipkart Task</title>
		<style>
			#mainarea {
					width:100%;
					height:1500px;

			}
			#bgarea {
					width:557px;
					height:660px;
					background:#A8A398;
					position:relative;
			}
			#bgarea img {

					height:100%;

			}
			#textarea {

					top:0;
					background-image:linear-gradient(to right,black,transparent 100%);

			}
			#textarea h2 {
					position:relative;
					top:10px;
					font-size:35px;
					color:white;

					margin-left:20px;

			}
			#textarea p {
					color:grey;
					margin-left:20px;

			}
			#textarea h3 {
					color:white;
					position:relative;
					top:-13px;
					font-size:22px;
					margin-left:20px;
					margin-bottom:-5px;

			}
		</style>
	</head>
	<body>
		<div id="mainarea">
			<div id="bgarea">
				<img src="shirt.png"/>
				<div id="textarea">
					<h2>Key Highlights</h2>
					<p>Fit</p>
					<h3>Regular</h3><hr size="1px" width="84%">
					<p>Pattern</p>
					<h3>Solid</h3><hr size="1px" width="84%">
					<p>Fabric</p>
					<h3>Cotton Blend</h3><hr size="1px" width="84%">
					<p>Ocassion</p>
					<h3>Casual</h3><hr size="1px" width="84%">
					<p>Collar</p>
					<h3>Button Down</h3>
					
				</div>
			</div>
		</div>

</html>
