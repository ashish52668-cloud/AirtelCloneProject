<html>
	<head>
		<title>Square task</title>
		<style>
		

		#mainarea {
				width:1200px;
				height:1500px;
				background:yellow;
				margin:0 auto;
				position:relative;
		}
		
		@keyframes car {
				from {
					transform:translate(-600px,0);
			
				}
				to  {
					transform:translate(1200px,0);
				}
		}
		@keyframes car2 {
				from {
					transform:translate(1200px,0);
				}
				to  {
					transform:translate(-1200px,0);
				}
		}

						
		
		#taskarea {
				width:100%;
				height:1000px;
				background:blue;
				position:relative;
				top:50px;
				overflow:hidden;
		}
		#road1 {
				width:100%;
				height:220px;
				position:relative;
				top:50px;
				background:brown;
				background-image:url('road2.jpg');
		}
		#road2 {
				width:100%;
				height:200px;
				position:relative;
				background:black;
				background-image:url('road2.jpg');
				top:200px;
		}

		#road1 img {
				animation-name:car;
				animation-duration:2s;
				animation-fill-mode:forwards;
				margin-top:20px;
						
		}
		#road2 img {
				animation-name:car2;
				animation-duration:5s;
				margin-top:20px;
				animation-fill-mode:forwards;
				float:right;
				
				
		}

				
				
	
		</style>
	</head>
	</body>
		<div id="mainarea">
			<div id="taskarea">
				<div id="road1">
					<img src="car.png"/>
				</div>

				<div id="road2">
					<img src="car2.png"/>
				</div>
				
			</div>
		</div>
	</body>
</htmml>
